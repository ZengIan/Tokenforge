# ============================================================================
# tokenforge 卡库 (gpus.yaml)
# ----------------------------------------------------------------------------
# 字段说明:
#   mem_gb        : 单卡显存 (GB)
#   bw_gbs        : 显存带宽 (GB/s) —— decode 吞吐的核心瓶颈,务必填准
#   fp16_tflops   : 稠密 FP16/BF16 Tensor Core 算力 (TFLOPS) —— ★dense, 非稀疏★
#   fp8_tflops    : 稠密 FP8 算力 (TFLOPS) —— 无原生 FP8 的架构填 0
#   nvlink        : 是否有片间高速互联 (true/false) —— 影响 TP all-reduce 效率
#   source        : 数据来源,便于 review 可信度。取值约定:
#                     datasheet      = 厂商官方规格书/白皮书 (最权威)
#                     measured@日期  = 自己实测 (国产卡首选,最可信)
#                     estimate       = 公开估值/推测 (★存疑,用前务必核实★)
#
# ⚠ TFLOPS 口径(重要):
#   统一采用「FP16/BF16 Tensor Core, 稠密(dense), FP32 累加」的官方规格值。
#   NVIDIA 营销常用「含稀疏 with sparsity」= 稠密 ×2,本文件一律已折算为稠密。
#   GeForce 消费卡的 FP16(FP32累加) 约为其 FP16(FP16累加) 峰值的一半,本文件按
#   FP32 累加口径填写,以便与数据中心卡同口径对比。Pascal(GTX1080) 无 Tensor
#   Core,fp16 退化严重,这里填其 FP32 算力作近似。
#
# ⚠ 国产卡:
#   昇腾/DCU/天数/昆仑/PPU 等公开参数多为新闻稿或推测,精度不可信,本文件统一标
#   source: estimate。上线/投标前务必用厂商 datasheet 或 npu-smi/hy-smi 等实测
#   覆盖,并把 source 改为 datasheet 或 measured@日期。
#   注:工具会自动识别 source=estimate / 算力为 0 的卡,在结果区提示
#   「性能与瓶颈分析不可靠」,仅显存与可容纳并发可参考。
# ============================================================================

